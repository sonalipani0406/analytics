services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: analytics_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount initialization scripts
      - ./backend/table.sql:/docker-entrypoint-initdb.d/01-table.sql
      - ./backend/supabase_analytics_function.sql:/docker-entrypoint-initdb.d/02-function.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=analytics_db
      - DB_USER=postgres
      - DB_PASS=postgrespassword
      - DB_PORT=5432
      - PORT=5000
      - FLASK_ENV=production
      - APP_USERS_CONNECT_TIMEOUT_SEC=20
      - APP_USERS_READ_TIMEOUT_SEC=120
      - APP_USERS_RETRIES=1
      - APP_USERS_CHUNK_DAYS=7
      - APP_USERS_CHUNK_LOOKBACK_DAYS=90
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - NO_PROXY=localhost,127.0.0.1,db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
